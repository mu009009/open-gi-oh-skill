
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 虾虾卡单卡测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .test-title {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .test-title h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #f97316, #eab308, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .test-title p {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        .test-card {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 16px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        
        .test-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card-id {
            font-family: monospace;
            font-size: 0.9rem;
            color: #94a3b8;
            background: rgba(15, 23, 42, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .image-display {
            width: 200px;
            height: 200px;
            margin: 0 auto 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .image-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .image-info {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 10px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-ok {
            background-color: #10b981;
        }
        
        .status-warning {
            background-color: #f59e0b;
        }
        
        .status-error {
            background-color: #ef4444;
        }
        
        .test-summary {
            margin-top: 40px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
        }
        
        .test-summary h3 {
            color: #22d3ee;
            margin-bottom: 15px;
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #f97316;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="test-title">
        <h1>🦐 虾虾卡图片测试页面</h1>
        <p>验证所有50张虾虾卡图片是否正确生成和显示</p>
    </div>
    
    <div class="card-container" id="cardContainer">
        <!-- 卡片将通过JavaScript动态生成 -->
    </div>
    
    <div class="test-summary">
        <h3>📊 测试总结</h3>
        <p>本页面显示所有生成的虾虾卡图片，验证图片生成和显示功能。</p>
        
        <div class="summary-stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">总卡片数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="loadedCards">0</div>
                <div class="stat-label">已加载</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="failedCards">0</div>
                <div class="stat-label">加载失败</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>
    </div>
    
    <script>
        // 图片文件列表
        const imageFiles = ["SHRIMP_004_2104", "SHRIMP_017_3135", "SHRIMP_040_8403", "SHRIMP_024_4768", "SHRIMP_014_5293", "SHRIMP_010_5006", "SHRIMP_015_3694", "SHRIMP_023_8956", "SHRIMP_013_6097", "SHRIMP_030_4727", "SHRIMP_044_1288", "SHRIMP_036_8611", "SHRIMP_004_XXXX", "SHRIMP_011_2927", "SHRIMP_020_1419", "SHRIMP_009_2894", "SHRIMP_001_4998", "SHRIMP_042_5606", "SHRIMP_028_6664", "SHRIMP_007_3402", "SHRIMP_022_3289", "SHRIMP_037_4643", "SHRIMP_019_6109", "SHRIMP_041_9391", "SHRIMP_003_XXXX", "SHRIMP_021_1624", "SHRIMP_039_7523", "SHRIMP_043_1610", "SHRIMP_031_6762", "SHRIMP_038_6488", "SHRIMP_002_9731", "SHRIMP_012_6420", "SHRIMP_006_6795", "SHRIMP_027_5405", "SHRIMP_029_6866", "SHRIMP_008_9851", "SHRIMP_033_1607", "SHRIMP_003_1737", "SHRIMP_025_7980", "SHRIMP_035_7119", "SHRIMP_005_XXXX", "SHRIMP_002_XXXX", "SHRIMP_005_2489", "SHRIMP_016_7812", "SHRIMP_034_6340", "SHRIMP_001_XXXX", "SHRIMP_032_4055", "SHRIMP_018_7672", "SHRIMP_045_8903", "SHRIMP_026_2557"];
        
        // 统计变量
        let totalCards = imageFiles.length;
        let loadedCards = 0;
        let failedCards = 0;
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalCards').textContent = totalCards;
            document.getElementById('loadedCards').textContent = loadedCards;
            document.getElementById('failedCards').textContent = failedCards;
            
            const successRate = totalCards > 0 ? Math.round((loadedCards / totalCards) * 100) : 0;
            document.getElementById('successRate').textContent = successRate + '%';
        }
        
        // 创建卡片
        function createCards() {
            const container = document.getElementById('cardContainer');
            
            imageFiles.forEach(cardId => {
                const cardElement = document.createElement('div');
                cardElement.className = 'test-card';
                
                const imagePath = `../images/shrimp-cards/${cardId}.png`;
                
                cardElement.innerHTML = `
                    <div class="card-header">
                        <div class="card-id">${cardId}</div>
                        <div class="status">
                            <span class="status-indicator status-warning"></span>
                            <span>加载中...</span>
                        </div>
                    </div>
                    <div class="image-display">
                        <img src="${imagePath}" 
                             alt="${cardId}" 
                             onload="imageLoaded('${cardId}')" 
                             onerror="imageFailed('${cardId}')">
                    </div>
                    <div class="image-info">
                        图片尺寸: 200×200px
                    </div>
                `;
                
                container.appendChild(cardElement);
            });
            
            updateStats();
        }
        
        // 图片加载成功
        function imageLoaded(cardId) {
            loadedCards++;
            updateStats();
            
            // 更新状态指示器
            const card = document.querySelector(`[alt="${cardId}"]`).closest('.test-card');
            const statusIndicator = card.querySelector('.status-indicator');
            const statusText = card.querySelector('.status span:last-child');
            
            statusIndicator.className = 'status-indicator status-ok';
            statusText.textContent = '加载成功';
        }
        
        // 图片加载失败
        function imageFailed(cardId) {
            failedCards++;
            updateStats();
            
            // 更新状态指示器
            const card = document.querySelector(`[alt="${cardId}"]`).closest('.test-card');
            const statusIndicator = card.querySelector('.status-indicator');
            const statusText = card.querySelector('.status span:last-child');
            
            statusIndicator.className = 'status-indicator status-error';
            statusText.textContent = '加载失败';
            
            // 显示错误信息
            const imgElement = card.querySelector('img');
            imgElement.style.opacity = '0.3';
            imgElement.style.filter = 'grayscale(100%)';
        }
        
        // 页面加载完成后创建卡片
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🦐 开始创建测试卡片...');
            createCards();
        });
        
        // 所有图片加载完成后显示完成信息
        function checkCompletion() {
            if (loadedCards + failedCards === totalCards) {
                console.log(`✅ 测试完成: ${loadedCards}成功, ${failedCards}失败`);
                
                // 添加完成提示
                const summary = document.querySelector('.test-summary');
                const completionMsg = document.createElement('div');
                completionMsg.style.marginTop = '20px';
                completionMsg.style.padding = '15px';
                completionMsg.style.background = loadedCards === totalCards ? 
                    'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)';
                completionMsg.style.borderRadius = '8px';
                completionMsg.style.border = loadedCards === totalCards ? 
                    '1px solid #10b981' : '1px solid #ef4444';
                completionMsg.style.color = loadedCards === totalCards ? '#10b981' : '#ef4444';
                
                if (loadedCards === totalCards) {
                    completionMsg.innerHTML = `<strong>🎉 测试通过！</strong> 所有${totalCards}张图片加载成功！`;
                } else {
                    completionMsg.innerHTML = `<strong>⚠️ 测试未完全通过</strong> ${loadedCards}/${totalCards}张图片加载成功，${failedCards}张失败。`;
                }
                
                summary.appendChild(completionMsg);
            }
        }
        
        // 更新检查完成
        window.imageLoaded = function(cardId) {
            imageLoaded(cardId);
            checkCompletion();
        };
        
        window.imageFailed = function(cardId) {
            imageFailed(cardId);
            checkCompletion();
        };
    </script>
</body>
</html>
