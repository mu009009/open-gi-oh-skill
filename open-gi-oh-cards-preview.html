<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎴 Open-Gi-Oh! 卡牌预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffcc00, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            width: 100%;
            height: 210px;
            background: linear-gradient(135deg, #2d3047 0%, #41476e 100%);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            border: 3px solid;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }
        .card-cost {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ff9a3c, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        .card-element {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5rem;
        }
        .card-name {
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            margin-top: 40px;
            color: white;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-stats {
            position: absolute;
            bottom: 15px;
            width: calc(100% - 30px);
            display: flex;
            justify-content: space-between;
        }
        .card-attack, .card-health {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .card-attack { background: linear-gradient(135deg, #ff6b6b, #ff9a3c); color: white; }
        .card-health { background: linear-gradient(135deg, #4ecdc4, #44a08d); color: white; }
        .card-rarity {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        .card-effect {
            position: absolute;
            bottom: 70px;
            left: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: #aaa;
            text-align: center;
            min-height: 20px;
        }
        .stats {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .stats h3 { margin-bottom: 15px; color: #4ecdc4; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }
        .element-colors {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 Open-Gi-Oh! 卡牌预览</h1>
            <p>基于数值模型生成的平衡卡牌 - 凤丹工作室出品</p>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="generateNewCards()">生成新卡牌</button>
            <button class="btn" onclick="filterByElement('all')">显示全部</button>
            <button class="btn" onclick="exportToJSON()">导出JSON</button>
        </div>
        
        <div class="filters">
            <select class="filter-select" onchange="filterByElement(this.value)">
                <option value="all">全部元素</option>
                <option value="fire">🔥 火元素</option>
                <option value="water">💧 水元素</option>
                <option value="wind">💨 风元素</option>
                <option value="earth">🪨 土元素</option>
                <option value="light">✨ 光元素</option>
                <option value="dark">🌑 暗元素</option>
            </select>
            
            <select class="filter-select" onchange="filterByRarity(this.value)">
                <option value="all">全部稀有度</option>
                <option value="N">普通</option>
                <option value="R">稀有</option>
                <option value="SR">超级稀有</option>
                <option value="SSR">传说</option>
            </select>
            
            <select class="filter-select" onchange="filterByCost(this.value)">
                <option value="all">全部费用</option>
                <option value="0-1">0-1费</option>
                <option value="2-3">2-3费</option>
                <option value="4-5">4-5费</option>
                <option value="6+">6费以上</option>
            </select>
        </div>
        
        <div class="cards-grid" id="cardsContainer">
            <!-- 卡牌将在这里显示 -->
        </div>
        
        <div class="stats" id="statsSection">
            <!-- 统计信息将在这里显示 -->
        </div>
    </div>

        let filteredCards = [...allCards];
        
        // 初始化显示
        function initDisplay() {
            renderCards(filteredCards);
            updateStats();
        }
        
        // 渲染卡牌
        function renderCards(cards) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            cards.forEach(card => {
                const elementIcon = {
                    'fire': '🔥',
                    'water': '💧',
                    'wind': '💨',
                    'earth': '🪨',
                    'light': '✨',
                    'dark': '🌑'
                }[card.element] || '🎴';
                
                const rarityColor = {
                    'N': '#cccccc',
                    'R': '#4ecdc4',
                    'SR': '#ff6b6b',
                    'SSR': '#ffcc00'
                }[card.rarity] || '#ffffff';
                
                const rarityName = {
                    'N': '普通',
                    'R': '稀有',
                    'SR': '超级稀有',
                    'SSR': '传说'
                }[card.rarity] || '未知';
                
                const cardHTML = `
                <div class="card" data-element="${card.element}" data-rarity="${card.rarity}" 
                     style="border-color: ${rarityColor};">
                    <div class="card-cost">${card.cost}</div>
                    <div class="card-element">${elementIcon}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-stats">
                        <div class="card-attack">${card.attack}</div>
                        <div class="card-health">${card.health}</div>
                    </div>
                    <div class="card-rarity" style="color: ${rarityColor};">${rarityName}</div>
                    <div class="card-effect">${card.effect || ''}</div>
                </div>
                `;
                
                container.innerHTML += cardHTML;
            });
        }
        
        // 更新统计信息
        function updateStats() {
            const stats = document.getElementById('statsSection');
            
            // 计算统计
            const totalCards = allCards.length;
            const avgCost = (allCards.reduce((sum, card) => sum + card.cost, 0) / totalCards).toFixed(2);
            const avgAttack = (allCards.reduce((sum, card) => sum + card.attack, 0) / totalCards).toFixed(2);
            const avgHealth = (allCards.reduce((sum, card) => sum + card.health, 0) / totalCards).toFixed(2);
            
            // 元素分布
            const elementDist = {};
            allCards.forEach(card => {
                elementDist[card.element] = (elementDist[card.element] || 0) + 1;
            });
            
            // 稀有度分布
            const rarityDist = {};
            allCards.forEach(card => {
                rarityDist[card.rarity] = (rarityDist[card.rarity] || 0) + 1;
            });
            
            // 费用分布
            const costDist = {};
            allCards.forEach(card => {
                costDist[card.cost] = (costDist[card.cost] || 0) + 1;
            });
            
            stats.innerHTML = `

                    <div class="stat-item">
                        <strong>费用分布:</strong><br>
                        ${Object.entries(costDist).map(([cost, count]) => 
                            `${cost}费: ${count}张`).join('<br>')}
                    </div>
                </div>
            `;
        }
        
        // 过滤函数
        function filterByElement(element) {
            if (element === 'all') {
                filteredCards = [...allCards];
            } else {
                filteredCards = allCards.filter(card => card.element === element);
            }
            renderCards(filteredCards);
        }
        
        function filterByRarity(rarity) {
            if (rarity === 'all') {
                filteredCards = [...allCards];
            } else {
                filteredCards = allCards.filter(card => card.rarity === rarity);
            }
            renderCards(filteredCards);
        }
        
        function filterByCost(costRange) {
            if (costRange === 'all') {
                filteredCards = [...allCards];
            } else {
                const [min, max] = costRange.split('-').map(Number);
                if (costRange.includes('+')) {
                    const minCost = parseInt(costRange);
                    filteredCards = allCards.filter(card => card.cost >= minCost);
                } else {
                    filteredCards = allCards.filter(card => card.cost >= min && card.cost <= max);
                }
            }
            renderCards(filteredCards);
        }
        
        // 生成新卡牌（模拟）
        function generateNewCards() {
            alert('在实际应用中，这里会调用后端API生成新卡牌。\n当前已加载 ${allCards.length} 张卡牌。');
        }
        
        // 导出JSON
        function exportToJSON() {
            const dataStr = JSON.stringify(allCards, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'open-gi-oh-cards.json';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }
        
        // 页面加载时初始化
        window.onload = initDisplay;
    </script>
</body>
</html>
